const grid=document.getElementById('grid'),elL=document.getElementById('fL'),elSub=document.getElementById('fSub'),elTi=document.getElementById('fTier'),elS=document.getElementById('sort'),elT=document.getElementById('fText'),elN=document.getElementById('count');
const ORDER=['アウター','トップス','パンツ','スカート','ワンピース','セットアップ'];
function ord(v){const i=ORDER.indexOf(v);return i<0?99:i;}
[...new Set(DATA.map(d=>d.cat_l).filter(Boolean))].sort((a,b)=>ord(a)-ord(b)||a.localeCompare(b)).forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;elL.appendChild(o);});
function fillSub(){
 const cur=elSub.value,L=elL.value;
 elSub.innerHTML='<option value="">小カテゴリ: すべて</option>';
 [...new Set(DATA.filter(d=>!L||d.cat_l===L).map(d=>d.cat_s).filter(Boolean))].sort().forEach(v=>{const o=document.createElement('option');o.value=v;o.textContent=v;elSub.appendChild(o);});
 elSub.value=[...elSub.options].some(o=>o.value===cur)?cur:'';
}
fillSub();
function fav(n){return n==null?'—':'♡ '+n.toLocaleString();}
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':s;return d.innerHTML;}
function render(){
 const L=elL.value,sub=elSub.value,ti=+elTi.value||0,s=elS.value,t=elT.value.trim();
 let rows=DATA.filter(d=>(!L||d.cat_l===L)&&(!sub||d.cat_s===sub)&&((d.fav||0)>=ti)&&(!t||((d.name||'')+(d.brand||'')).indexOf(t)>=0));
 if(s==='favasc')rows.sort((a,b)=>(a.fav||0)-(b.fav||0));else rows.sort((a,b)=>(b.fav||0)-(a.fav||0));
 elN.textContent=rows.length+'件';const f=document.createDocumentFragment();
 for(const d of rows.slice(0,1500)){const a=document.createElement('a');a.className='card';a.href=d.url;a.target='_blank';
  const img=d.imgfile?('<img class="thumb" loading="lazy" src="'+d.imgfile+'">'):'<div class="noimg">no image</div>';
  a.innerHTML=img+'<div class="body"><div class="brand">'+esc(d.brand)+' '+esc(d.cat)+'</div><div class="name">'+esc(d.name)+'</div><div><span class="price">'+esc(d.price)+'</span></div><div class="fav">'+fav(d.fav)+'</div></div>';
  f.appendChild(a);}
 grid.innerHTML='';grid.appendChild(f);
}
elL.addEventListener('change',()=>{fillSub();render();});[elSub,elTi,elS].forEach(e=>e.addEventListener('change',render));elT.addEventListener('input',render);render();
